{% extends 'garagem/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h2 class="fw-bold mb-4">{{ titulo }}</h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="{{ form.garagem.id_for_label }}" class="form-label fw-semibold">Garagem</label>
                {{ form.garagem }}
            </div>

            <div class="mb-3">
                <label for="{{ form.vin.id_for_label }}" class="form-label fw-semibold">VIN</label>
                {{ form.vin }}
            </div>

            <div class="mb-3">
                <label for="{{ form.marca.id_for_label }}" class="form-label fw-semibold">Marca</label>
                {{ form.marca }}
            </div>

            <div class="mb-3">
                <label for="{{ form.modelo.id_for_label }}" class="form-label fw-semibold">Modelo</label>
                {{ form.modelo }}
            </div>

            <div class="mb-3">
                <label for="{{ form.ano_modelo.id_for_label }}" class="form-label fw-semibold">Ano do modelo</label>
                {{ form.ano_modelo }}
            </div>

            <div class="mb-3">
                <label for="{{ form.fabricante.id_for_label }}" class="form-label fw-semibold">Fabricante</label>
                {{ form.fabricante }}
            </div>

            <div class="mb-3">
                <label for="{{ form.tipo_veiculo.id_for_label }}" class="form-label fw-semibold">Tipo de veículo</label>
                {{ form.tipo_veiculo }}
            </div>

            <div class="mb-3">
                <label for="{{ form.observacao.id_for_label }}" class="form-label fw-semibold">Observação</label>
                {{ form.observacao }}
            </div>

            <button type="submit" class="btn btn-success px-4">Salvar</button>
            <a href="{% url 'listar_veiculos' %}" class="btn btn-secondary px-4 ms-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}

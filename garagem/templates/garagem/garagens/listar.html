{% extends 'garagem/base.html' %}

{% block content %}
<h2>Garagens</h2>

<a href="{% url 'criar_garagem' %}">Nova garagem</a>

<ul>
    {% for garagem in garagens %}
        <li>
            {{ garagem.nome }}
            <br>
            <a href="{% url 'editar_garagem' garagem.id %}">Editar</a>
            |
            <a href="{% url 'excluir_garagem' garagem.id %}">Excluir</a>
        </li>
    {% endfor %}
</ul>
{% endblock %}

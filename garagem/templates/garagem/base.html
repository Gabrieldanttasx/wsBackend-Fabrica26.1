<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GarageVIN</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .navbar-custom {
            background: white;
            border-radius: 16px;
            padding: 18px 24px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
        }

        .brand-title {
            font-weight: 700;
            font-size: 2rem;
            color: #1f2937;
        }

        .main-card {
            background: white;
            border: none;
            border-radius: 18px;
            box-shadow: 0 6px 22px rgba(0, 0, 0, 0.08);
        }

        .nav-buttons a {
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="navbar-custom mb-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <h1 class="brand-title mb-0">🚗 GarageVIN</h1>

            <div class="nav-buttons d-flex flex-wrap gap-2">
                <a class="btn btn-outline-primary" href="{% url 'home' %}">Home</a>
                <a class="btn btn-outline-success" href="{% url 'listar_garagens' %}">Garagens</a>
                <a class="btn btn-outline-warning" href="{% url 'listar_veiculos' %}">Veículos</a>
                <a class="btn btn-outline-dark" href="{% url 'consultar_vin' %}">Consultar VIN</a>
            </div>
        </div>
    </div>

    <div class="card main-card p-4">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
